services:
  - type: web
    name: signage-api
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: signage-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: REDIS_URL
        value: ""
      - key: DEFAULT_ORG_NAME
        value: Mi Empresa
      - key: PORT
        value: "10000"

databases:
  - name: signage-db
    databaseName: signage
    plan: free
    ipAllowList: []

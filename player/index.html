<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Signage Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
body { --purpose-color: #64748b; --purpose-color-2: #0f172a; --purpose-glow: rgba(100,116,139,0.35); }
#app { width: 100%; height: 100%; position: relative; }
#app::before { content: ""; position: fixed; inset: 0; z-index: 0; pointer-events: none; background:
  radial-gradient(circle at 20% 12%, var(--purpose-glow), transparent 34%),
  linear-gradient(135deg, rgba(0,0,0,0.55), rgba(0,0,0,0.92));
  opacity: 0; transition: opacity 0.5s ease; }
body.player-idle #app::before, body.player-pairing #app::before { opacity: 1; }
.slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
.slide.active { display: flex; align-items: center; justify-content: center; }
.slide iframe { width: 100%; height: 100%; border: 0; }
.slide img { width: 100%; height: 100%; object-fit: contain; }
.slide video { width: 100%; height: 100%; object-fit: contain; }
.slide .html-content { width: 100%; height: 100%; padding: 40px; overflow: auto; }
.slide .rss-content { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 40px; text-align: center; }
.slide {
  --tpl-primary: var(--purpose-color, #64748b);
  --tpl-bg: #ffffff;
  --tpl-text: #111827;
  --tpl-ticker-bg: #ffffff;
  --tpl-ticker-text: #0f172a;
  --tpl-widget-bg: color-mix(in srgb, var(--tpl-primary) 78%, #ffffff);
  --tpl-accent: #244244;
  --tpl-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --tpl-radius: 4px;
  --tpl-media-fit: cover;
  --tpl-ticker-speed: 12s;
  --tpl-scale: 1; }
.slide.template-full_bleed img, .slide.template-full_bleed video, .slide.template-full_bleed iframe { width: 100%; height: 100%; object-fit: var(--tpl-media-fit, cover); border: 0; }
.tpl-ticker { display: flex; min-height: 0; align-items: center; gap: 2vw; border: 1px solid color-mix(in srgb, var(--tpl-accent) 76%, transparent); background: var(--tpl-ticker-bg); padding: 0 3vw; color: var(--tpl-ticker-text); }
.tpl-ticker-logo { color: var(--tpl-primary); font-size: calc(clamp(1.4rem, 2.6vw, 3rem) * var(--tpl-scale)); font-weight: 900; line-height: 1; display: flex; align-items: center; }
.tpl-ticker-logo img { max-height: clamp(1.6rem, 3vw, 3.2rem); width: auto; object-fit: contain; }
.tpl-ticker-track { overflow: hidden; flex: 1; display: flex; min-width: 0; }
.tpl-ticker-text { white-space: nowrap; flex-shrink: 0; font-size: calc(clamp(0.8rem, 1.3vw, 1.6rem) * var(--tpl-scale)); font-weight: 800; }
.tpl-ticker-text.marquee { animation: tpl-marquee var(--tpl-ticker-speed, 12s) linear infinite; }
.tpl-ticker-text-clone { }
@keyframes tpl-marquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

#pair-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--purpose-color-2), var(--purpose-color)); z-index: 100; }
#pair-screen.hidden { display: none; }
#pair-screen h1 { font-size: 2em; margin-bottom: 10px; }
#pair-screen p { font-size: 1.1em; opacity: 0.8; margin-bottom: 30px; }
#pair-code-input { font-size: 2em; padding: 15px 25px; border: 3px solid rgba(255,255,255,0.5); border-radius: 12px; background: rgba(255,255,255,0.15); color: #fff; text-align: center; width: 280px; letter-spacing: 8px; text-transform: uppercase; outline: none; }
#pair-code-input::placeholder { color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: none; }
#pair-code-input:focus { border-color: #fff; }
#pair-error { color: #fca5a5; margin-top: 12px; min-height: 20px; font-size: 0.9em; }
#pair-btn { margin-top: 20px; padding: 12px 40px; border: none; border-radius: 8px; background: #fff; color: var(--purpose-color); font-size: 1.1em; font-weight: 600; cursor: pointer; }
#pair-btn:hover { background: #f0f9ff; }

#status-bar { position: fixed; right: 18px; bottom: 18px; z-index: 70; display: flex; align-items: center; justify-content: center; padding: 0; font-size: 12px; color: rgba(255,255,255,0.72); pointer-events: none; }
#status-bar .status-left, #status-bar .status-screen, #status-bar .status-debug, #status-bar .status-clock { display: inline-flex; align-items: center; gap: 8px; min-width: 0; }
#status-bar .status-screen { flex: 1; justify-content: center; font-weight: 600; }
#status-bar .status-debug { flex: 1; justify-content: flex-end; opacity: 0.65; }
#status-bar .status-left,
#status-bar .status-screen,
#status-bar .status-debug,
#status-bar .status-clock { display: none; }
#status-bar .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
#status-bar .status-dot.online { background: #22c55e; }
#status-bar .status-dot.offline { background: #ef4444; }
#status-bar .status-dot.connecting { background: #eab308; }
#fs-btn { background: rgba(0,0,0,0.34); border: 1px solid rgba(255,255,255,0.18); color: rgba(255,255,255,0.74); border-radius: 999px; cursor: pointer; font-size: 11px; padding: 7px 11px; line-height: 1.2; white-space: nowrap; pointer-events: auto; backdrop-filter: blur(12px); }
#fs-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
body.is-fullscreen #status-bar { right: 18px; bottom: 18px; }
body.is-fullscreen #status-bar .status-left,
body.is-fullscreen #status-bar .status-screen,
body.is-fullscreen #status-bar .status-debug,
body.is-fullscreen #status-bar .status-clock { display: none; }
body.is-fullscreen #fs-btn { background: rgba(0,0,0,0.42); border-color: rgba(255,255,255,0.16); color: rgba(255,255,255,0.72); }

.transition-fade .slide { transition: opacity 0.8s ease; }
.transition-slide .slide { transition: transform 0.8s ease; }

#purpose-bar { position: fixed; top: 0; left: 0; right: 0; height: 5px; z-index: 60; background: var(--purpose-color); box-shadow: 0 0 28px var(--purpose-glow); transition: background 0.5s ease, box-shadow 0.5s ease; }
#purpose-overlay { position: fixed; top: 18px; left: 18px; z-index: 55; display: none; align-items: center; gap: 10px; border: 1px solid color-mix(in srgb, var(--purpose-color) 58%, transparent); border-radius: 999px; background: color-mix(in srgb, var(--purpose-color) 24%, rgba(0,0,0,0.52)); box-shadow: 0 16px 60px var(--purpose-glow); padding: 8px 13px; font-size: 12px; font-weight: 800; letter-spacing: 0.02em; color: #fff; backdrop-filter: blur(16px); }
#purpose-overlay-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--purpose-color); box-shadow: 0 0 18px var(--purpose-color); }
body.player-playing #purpose-overlay { display: inline-flex; }
body.player-pairing #purpose-overlay { display: none; }
body.template-signage.player-playing #purpose-overlay { display: none; }
.purpose-manufacturing_logistics { --purpose-color: #ef4444; --purpose-color-2: #7f1d1d; --purpose-glow: rgba(239,68,68,0.38); }
.purpose-office_communications { --purpose-color: #3b82f6; --purpose-color-2: #0f3b82; --purpose-glow: rgba(59,130,246,0.38); }
.purpose-cafeteria_restaurant { --purpose-color: #f59e0b; --purpose-color-2: #78350f; --purpose-glow: rgba(245,158,11,0.42); }
.purpose-retail_promotions { --purpose-color: #ec4899; --purpose-color-2: #831843; --purpose-glow: rgba(236,72,153,0.4); }
.purpose-healthcare { --purpose-color: #14b8a6; --purpose-color-2: #134e4a; --purpose-glow: rgba(20,184,166,0.38); }
.purpose-events { --purpose-color: #8b5cf6; --purpose-color-2: #3b1678; --purpose-glow: rgba(139,92,246,0.42); }
.purpose-public_information { --purpose-color: #10b981; --purpose-color-2: #064e3b; --purpose-glow: rgba(16,185,129,0.36); }
.purpose-other { --purpose-color: #64748b; --purpose-color-2: #0f172a; --purpose-glow: rgba(100,116,139,0.35); }
.idle-card { position: relative; z-index: 1; display: flex; min-width: 320px; max-width: 720px; flex-direction: column; align-items: center; gap: 14px; border: 1px solid rgba(255,255,255,0.14); border-radius: 24px; background: rgba(15,23,42,0.58); padding: 42px 56px; box-shadow: 0 24px 80px rgba(0,0,0,0.36); text-align: center; backdrop-filter: blur(18px); }
.idle-card h2 { font-size: clamp(2rem, 5vw, 4.2rem); line-height: 1; }
.idle-purpose { display: inline-flex; align-items: center; gap: 8px; border-radius: 999px; background: color-mix(in srgb, var(--purpose-color) 22%, transparent); border: 1px solid color-mix(in srgb, var(--purpose-color) 55%, transparent); color: #fff; padding: 8px 14px; font-size: 0.9rem; font-weight: 700; letter-spacing: 0.02em; }
.idle-purpose-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--purpose-color); box-shadow: 0 0 18px var(--purpose-color); }
.idle-muted { color: rgba(255,255,255,0.58); font-size: 1rem; }

/* Professional signage templates: Canvas, Command, Spotlight, Market, Pulse */
.slide.template-media_left, .slide.template-media_right,
.slide.template-center_stage, .slide.template-hero_overlay {
  grid-template-rows: 85% 15%;
  background: var(--tpl-bg);
}
.tpl-grid {
  grid-template-columns: 36% 40% 24%;
  gap: 1px;
  padding: 1px;
  border: 0;
  background: rgba(15,23,42,0.16);
}
.template-media_right .tpl-grid { grid-template-columns: 40% 36% 24%; }
.tpl-media { position: relative; background: linear-gradient(135deg,#dbeafe,#e2e8f0 48%,#94a3b8); }
.tpl-media::after {
  content: ""; position: absolute; inset: 4vh; border: 1px solid rgba(255,255,255,0.42);
  border-radius: calc(var(--tpl-radius) + 10px); pointer-events: none; box-shadow: inset 0 0 80px rgba(255,255,255,0.08);
}
.tpl-sidebar {
  position: relative; overflow: hidden; justify-content: flex-start; padding: 6vh 3.6vw;
  background: linear-gradient(135deg, color-mix(in srgb, var(--tpl-primary) 10%, #fff), #fff 46%, color-mix(in srgb, var(--tpl-primary) 17%, #fff));
}
.tpl-sidebar::before {
  content: ""; position: absolute; top: -12vh; right: -7vw; width: 22vw; aspect-ratio: 1;
  border-radius: 999px; background: var(--tpl-primary); opacity: 0.15;
}
.tpl-badge { position: relative; color: var(--tpl-primary); text-transform: uppercase; letter-spacing: 0.08em; font-size: calc(clamp(0.65rem, 0.9vw, 1rem) * var(--tpl-scale)); }
.tpl-headline { position: relative; margin-top: 1.8vh; color: var(--tpl-text); font-size: calc(clamp(2rem, 4.5vw, 5.7rem) * var(--tpl-scale)); line-height: 0.9; letter-spacing: -0.04em; }
.tpl-subrow { position: relative; margin-top: 4vh; align-items: flex-start; }
.tpl-qr { width: clamp(58px, 6vw, 94px); border-radius: calc(var(--tpl-radius) + 4px); background: #fff; }
.tpl-subtitle { font-size: calc(clamp(0.82rem, 1.25vw, 1.6rem) * var(--tpl-scale)); line-height: 1.25; }
.tpl-sidebar::after {
  content: "NOW  NEXT  LIVE"; position: absolute; left: 3.6vw; right: 3.6vw; bottom: 4vh;
  display: grid; grid-template-columns: repeat(3,1fr); gap: 0.6vw; color: rgba(15,23,42,0.48);
  font-size: clamp(0.45rem, 0.58vw, 0.7rem); font-weight: 900; letter-spacing: 0.08em;
}
.tpl-weather-right {
  justify-content: space-between; padding: 5vh 2.2vw;
  background: linear-gradient(180deg, var(--tpl-widget-bg), var(--tpl-accent)); border: 0;
}
.tpl-wloc { font-size: calc(clamp(1rem, 1.55vw, 1.9rem) * var(--tpl-scale)); }
.tpl-wpill { width: fit-content; background: rgba(255,255,255,0.2); color: #fff; text-transform: uppercase; letter-spacing: 0.08em; }
.tpl-wicon { margin-top: 0; }
.tpl-wtemp { margin-top: 1vh; }
.tpl-center { position: relative; height: 100%; background: #020617; }
.tpl-center-media { position: absolute; inset: 3vh 2vw 27%; border: 1px solid rgba(255,255,255,0.12); border-radius: calc(var(--tpl-radius) + 12px); }
.tpl-center-bar {
  position: absolute; left: 2vw; right: 2vw; bottom: 7%; display: grid; grid-template-columns: auto 1fr auto auto;
  border: 1px solid rgba(255,255,255,0.12); border-radius: calc(var(--tpl-radius) + 12px);
  background: rgba(255,255,255,0.11); backdrop-filter: blur(18px); padding: 2vh 2vw;
}
.tpl-center-headline { font-size: calc(clamp(1.1rem, 1.9vw, 2.4rem) * var(--tpl-scale)); }
.tpl-center-widget { margin-left: 0; border-radius: 999px; background: var(--tpl-widget-bg); padding: 0.6em 0.9em; opacity: 1; }
.tpl-hero-overlay { padding: 6vh 5vw 8vh; background: linear-gradient(0deg, rgba(0,0,0,0.88) 8%, rgba(0,0,0,0.48) 44%, transparent); }
.tpl-hero-badge { text-transform: uppercase; letter-spacing: 0.08em; font-weight: 900; }
.tpl-hero-headline { max-width: 12ch; font-size: calc(clamp(2.4rem, 6vw, 8rem) * var(--tpl-scale)); letter-spacing: -0.055em; }
.tpl-hero-subrow { margin-top: 2.2vh; }
.tpl-hero-qr { width: clamp(58px, 5vw, 86px); background: rgba(255,255,255,0.16); backdrop-filter: blur(12px); }
.tpl-hero-sub { max-width: 38ch; font-weight: 650; }
.tpl-hero-widget { top: 3vh; right: 3vw; border: 1px solid rgba(255,255,255,0.18); background: color-mix(in srgb, var(--tpl-widget-bg) 86%, transparent); }
.tpl-ticker { border: 0; border-top: 1px solid rgba(15,23,42,0.12); }
.tpl-ticker-logo { font-weight: 950; }
.tpl-ticker-text { font-weight: 850; letter-spacing: -0.01em; }
</style>
</head>
<body class="player-pairing purpose-other">
<div id="app">
  <div id="purpose-bar"></div>
  <div id="purpose-overlay"><span id="purpose-overlay-dot"></span><span id="purpose-overlay-label">Other</span></div>
  <div id="player-container"></div>
  <div id="pair-screen">
    <h1>Signage Player</h1>
    <p>Ingresa el código de vinculación</p>
    <input type="text" id="pair-code-input" placeholder="CÓDIGO" maxlength="6" autofocus>
    <button id="pair-btn">Vincular</button>
    <div id="pair-error"></div>
  </div>
  <div id="status-bar">
    <span class="status-left"><span class="status-dot offline" id="status-dot"></span> <span id="status-text">Desconectado</span></span>
    <span class="status-screen"><span id="screen-name"></span> <span id="purpose-label" style="font-size:10px;opacity:0.65;"></span></span>
    <span class="status-debug" id="debug-info" style="font-size:10px;"></span>
    <button id="fs-btn">⛶ Pantalla completa</button>
    <span class="status-clock" id="time-display"></span>
  </div>
</div>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    for (var i = 0; i < regs.length; i++) { regs[i].unregister(); }
  });
  navigator.serviceWorker.register('/player/sw.js').catch(function () {});
}
</script>
<script>
(function () {
  'use strict';

  var urlParams = new URLSearchParams(window.location.search);
  var apiOverride = urlParams.get('api');
  if (apiOverride) {
    localStorage.setItem('signage_api_url', apiOverride);
  }
  var storedApi = localStorage.getItem('signage_api_url');
  var API_BASE = storedApi || '/api';
  var WS_BASE;
  if (storedApi || apiOverride) {
    var baseUrl = storedApi || apiOverride;
    var clean = baseUrl.replace(/\/api\/?$/, '').replace(/\/+$/, '');
    var protocol = clean.indexOf('https://') === 0 ? 'wss://' : 'ws://';
    WS_BASE = protocol + clean.replace(/^https?:\/\//, '');
    if (!WS_BASE.match(/^wss?:\/\//)) WS_BASE = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + WS_BASE;
  } else {
    WS_BASE = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host;
  }
  var HEARTBEAT_INTERVAL = 30000;
  var PROOF_QUEUE_KEY = 'signage_proof_queue';
  var screenId = null;
  var screenToken = null;
  var SCREEN_TOKEN_KEY = 'signage_screen_token';
  var currentIndex = 0;
  var items = [];
  var rotationTimer = null;
  var pollTimer = null;
  var ws = null;
  var heartbeatTimer = null;
  var videoElement = null;
  var reconnectAllowed = true;
  var wsReconnectDelay = 5000;
  var WS_RECONNECT_MAX = 60000;
  var currentPlayback = {
    playbackState: 'empty',
    currentContentId: null,
    currentContentTitle: null,
    currentScheduleId: null,
    currentPlaylistId: null,
    playbackMessage: 'Esperando contenido'
  };
  var currentPurpose = 'other';
  var currentTemplate = 'full_bleed';
  var currentTemplateText = { badge: '', headline: '', subtitle: '' };
  var currentTemplateStyle = {};
  var FONT_FAMILIES = {
    system: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif',
    sans: 'Inter, "Helvetica Neue", Arial, sans-serif',
    serif: 'Georgia, "Times New Roman", serif',
    mono: '"SF Mono", "Fira Code", "Cascadia Code", monospace',
    display: '"Poppins", "SF Pro Display", system-ui, sans-serif',
  };

  // --- DOM refs ---
  var container = document.getElementById('player-container');
  var pairScreen = document.getElementById('pair-screen');
  var pairInput = document.getElementById('pair-code-input');
  var pairBtn = document.getElementById('pair-btn');
  var pairError = document.getElementById('pair-error');
  var statusDot = document.getElementById('status-dot');
  var statusText = document.getElementById('status-text');
  var screenNameEl = document.getElementById('screen-name');
  var purposeLabelEl = document.getElementById('purpose-label');
  var purposeOverlayLabelEl = document.getElementById('purpose-overlay-label');
  var timeDisplay = document.getElementById('time-display');

  var PURPOSE_LABELS = {
    manufacturing_logistics: 'Manufacturing & Logistics',
    office_communications: 'Office Communications',
    cafeteria_restaurant: 'Cafeteria & Restaurant',
    retail_promotions: 'Retail Promotions',
    healthcare: 'Healthcare',
    events: 'Events',
    public_information: 'Public Information',
    other: 'Custom',
    office: 'Office Communications',
    public_info: 'Public Information',
    menu_board: 'Cafeteria & Restaurant',
    lobby: 'Office Communications',
    meeting_room: 'Office Communications',
    production: 'Manufacturing & Logistics',
  };
  var LEGACY_PURPOSES = {
    office: 'office_communications',
    public_info: 'public_information',
    menu_board: 'cafeteria_restaurant',
    lobby: 'office_communications',
    meeting_room: 'office_communications',
    production: 'manufacturing_logistics'
  };
  function normalizePurpose(purpose) {
    return LEGACY_PURPOSES[purpose] || purpose || 'other';
  }
  function applyPurpose(purpose) {
    var nextPurpose = normalizePurpose(purpose);
    if (!PURPOSE_LABELS[nextPurpose]) nextPurpose = 'other';
    currentPurpose = nextPurpose;
    var classes = document.body.className ? document.body.className.split(/\s+/) : [];
    var kept = [];
    for (var i = 0; i < classes.length; i++) {
      if (classes[i] && classes[i].indexOf('purpose-') !== 0) kept.push(classes[i]);
    }
    kept.push('purpose-' + nextPurpose);
    document.body.className = kept.join(' ');
    if (purposeLabelEl) purposeLabelEl.textContent = PURPOSE_LABELS[nextPurpose] || nextPurpose;
    if (purposeOverlayLabelEl) purposeOverlayLabelEl.textContent = PURPOSE_LABELS[nextPurpose] || nextPurpose;
  }
  function applyTemplate(template) {
    currentTemplate = template || 'full_bleed';
    document.body.classList.toggle('template-signage', currentTemplate !== 'full_bleed');
  }
  function applyTemplateText(templateText) {
    currentTemplateText = {
      badge: templateText && templateText.badge ? String(templateText.badge) : '',
      headline: templateText && templateText.headline ? String(templateText.headline) : '',
      subtitle: templateText && templateText.subtitle ? String(templateText.subtitle) : '',
      qrText: templateText && templateText.qrText ? String(templateText.qrText) : '',
      weatherLocation: templateText && templateText.weatherLocation ? String(templateText.weatherLocation) : '',
      temperature: templateText && templateText.temperature ? String(templateText.temperature) : '',
      ticker: templateText && templateText.ticker ? String(templateText.ticker) : '',
      logoText: templateText && templateText.logoText ? String(templateText.logoText) : '',
    };
  }
  function applyTemplateStyle(templateStyle) {
    currentTemplateStyle = {};
    if (templateStyle && typeof templateStyle === 'object') {
      for (var key in templateStyle) {
        if (templateStyle[key] != null && templateStyle[key] !== '') {
          currentTemplateStyle[key] = String(templateStyle[key]);
        }
      }
    }
  }

  // --- Clock ---
  function updateClock() {
    var now = new Date();
    timeDisplay.textContent = now.toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
  }
  setInterval(updateClock, 10000);
  updateClock();

  // --- Status ---
  var debugEl = document.getElementById('debug-info');
  function setStatus(state, text) {
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = text;
  }
  function setDebug(msg) {
    if (debugEl) debugEl.textContent = msg;
  }

  // --- Pairing ---
  pairBtn.addEventListener('click', doPair);
  pairInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') doPair();
  });

  function screenHeaders() {
    var h = { 'Content-Type': 'application/json' };
    if (screenToken) h['X-Screen-Token'] = screenToken;
    return h;
  }

  function doPair() {
    var code = pairInput.value.trim().toUpperCase();
    if (code.length !== 6) {
      pairError.textContent = 'El código debe tener 6 caracteres';
      return;
    }
    pairError.textContent = '';
    pairBtn.disabled = true;
    pairBtn.textContent = 'Vinculando...';

    fetch(API_BASE + '/screens/pair', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code })
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (data.error) throw new Error(data.error);
      screenId = data.id;
      screenToken = data.screenToken || null;
      reconnectAllowed = true;
      localStorage.setItem('signage_screen_id', screenId);
      if (screenToken) localStorage.setItem(SCREEN_TOKEN_KEY, screenToken);
      if (window.history && window.history.replaceState) {
        window.history.replaceState({}, document.title, '/player');
      }
      pairScreen.classList.add('hidden');
      document.body.classList.remove('player-pairing');
      screenNameEl.textContent = data.name;
      if (data.purpose) applyPurpose(data.purpose);
      startPlayer();
    })
    .catch(function (err) {
      pairError.textContent = err.message || 'Error al vincular';
      pairBtn.disabled = false;
      pairBtn.textContent = 'Vincular';
    });
  }

  var POLL_INTERVAL = 30000;

  function setPlaybackState(state, item, message) {
    currentPlayback = {
      playbackState: state,
      currentContentId: item && item.content ? item.content.id : null,
      currentContentTitle: item && item.content ? item.content.title : null,
      currentScheduleId: item && item.scheduleId ? item.scheduleId : null,
      currentPlaylistId: item && item.playlistId ? item.playlistId : null,
      playbackMessage: message || ''
    };
  }

  function buildHeartbeatPayload() {
    return {
      screenId: screenId,
      playbackState: currentPlayback.playbackState,
      currentContentId: currentPlayback.currentContentId,
      currentContentTitle: currentPlayback.currentContentTitle,
      currentScheduleId: currentPlayback.currentScheduleId,
      currentPlaylistId: currentPlayback.currentPlaylistId,
      playbackMessage: currentPlayback.playbackMessage
    };
  }

  function sendHeartbeat() {
    if (!screenId) return;
    fetch(API_BASE + '/screens/heartbeat', {
      method: 'POST',
      headers: screenHeaders(),
      body: JSON.stringify(buildHeartbeatPayload())
    }).then(function () {
      flushProofQueue();
    }).catch(function () {});
  }

  function showPairingScreen(message) {
    reconnectAllowed = false;
    if (heartbeatTimer) clearInterval(heartbeatTimer);
    if (pollTimer) clearInterval(pollTimer);
    if (rotationTimer) clearTimeout(rotationTimer);
    heartbeatTimer = null;
    pollTimer = null;
    rotationTimer = null;
    videoElement = null;
    items = [];
    currentIndex = 0;
    screenId = null;
    localStorage.removeItem('signage_screen_id');
    localStorage.removeItem(SCREEN_TOKEN_KEY);
    localStorage.removeItem(PROOF_QUEUE_KEY);
    if (ws) {
      try { ws.close(); } catch (e) {}
      ws = null;
    }
    container.innerHTML = '';
    pairInput.value = '';
    pairBtn.disabled = false;
    pairBtn.textContent = 'Vincular';
    pairError.textContent = message || '';
    pairScreen.classList.remove('hidden');
    document.body.classList.add('player-pairing');
    document.body.classList.remove('player-playing');
    document.body.classList.remove('player-idle');
    setStatus('offline', 'Desvinculado');
  }

  // --- Player ---
  function startPlayer() {
    if (!screenId) return;
    setStatus('connecting', 'Conectando...');
    connectWebSocket();
    fetchPlaylist();
    startHeartbeat();
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(fetchPlaylist, POLL_INTERVAL);
  }

  var lastPlaylistSignature = '';

  function playlistSignature(data) {
    var ids = (data.items || []).map(function (i) { return i.id; }).join(',');
    var schId = data.schedule ? data.schedule.id : '';
    var plId = data.playlist ? data.playlist.id : '';
    return schId + '|' + plId + '|' + ids;
  }

  function fetchPlaylist() {
    setDebug('Fetching...');
    var fetchHeaders = {};
    if (screenToken) fetchHeaders['X-Screen-Token'] = screenToken;
    fetch(API_BASE + '/player/' + screenId, { headers: fetchHeaders })
      .then(function (res) {
        setDebug('Status: ' + res.status);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function (data) {
        flushProofQueue();
        var count = data.items ? data.items.length : 0;
        setDebug('Items: ' + count + ' | ' + (data.message || ''));
        if (data.screen) {
          if (data.screen.name) screenNameEl.textContent = data.screen.name;
          applyPurpose(data.screen.purpose);
          applyTemplate(data.screen.template);
          applyTemplateText(data.screen.templateText);
          applyTemplateStyle(data.screen.templateStyle);
        }
        if (data.items && data.items.length > 0) {
          var sig = playlistSignature(data);
          var playlistChanged = sig !== lastPlaylistSignature;
          lastPlaylistSignature = sig;
          document.body.classList.remove('player-idle');
          document.body.classList.add('player-playing');
          items = data.items.map(function (entry) {
            return {
              id: entry.id,
              position: entry.position,
              duration: entry.duration,
              content: entry.content,
              scheduleId: data.schedule ? data.schedule.id : null,
              playlistId: data.playlist ? data.playlist.id : null,
              source: data.schedule ? 'schedule' : 'idle'
            };
          });
          if (playlistChanged) {
            currentIndex = 0;
            renderCurrent();
            startRotation();
          }
        } else {
          lastPlaylistSignature = '';
          setPlaybackState('empty', null, data.message || 'Sin contenido asignado');
          sendHeartbeat();
          showIdle();
        }
      })
      .catch(function (err) {
        setDebug('Error: ' + (err.message || 'unknown'));
        var msg = (err.message || '');
        if (msg.indexOf('HTTP 404') !== -1) {
          localStorage.removeItem('signage_screen_id');
          localStorage.removeItem(PROOF_QUEUE_KEY);
          location.reload();
          return;
        }
        setPlaybackState('error', null, msg || 'No se pudo obtener contenido');
        sendHeartbeat();
        showIdle();
      });
  }

  function renderCurrent() {
    if (!items.length) return;
    var item = items[currentIndex];
    if (!item || !item.content) return;
    setPlaybackState(item.source === 'schedule' ? 'playing_schedule' : 'playing_idle', item, item.source === 'schedule' ? 'Reproduciendo programación' : 'Reproduciendo contenido idle');
    sendHeartbeat();
    logProofOfPlay(item);
    container.innerHTML = '';
    var div = document.createElement('div');
    div.className = 'slide active template-' + currentTemplate;
    (function applyStyle(el, style) {
      if (!style) return;
      if (style.primaryColor) el.style.setProperty('--tpl-primary', style.primaryColor);
      if (style.bgColor) el.style.setProperty('--tpl-bg', style.bgColor);
      if (style.textColor) el.style.setProperty('--tpl-text', style.textColor);
      if (style.tickerBg) el.style.setProperty('--tpl-ticker-bg', style.tickerBg);
      if (style.tickerText) el.style.setProperty('--tpl-ticker-text', style.tickerText);
      if (style.widgetBg) el.style.setProperty('--tpl-widget-bg', style.widgetBg);
      if (style.accentColor) el.style.setProperty('--tpl-accent', style.accentColor);
      if (style.fontFamily && FONT_FAMILIES[style.fontFamily]) el.style.setProperty('--tpl-font', FONT_FAMILIES[style.fontFamily]);
      if (style.cornerRadius) {
        var RADIUS_MAP = { none: '0px', subtle: '4px', rounded: '8px', pill: '9999px' };
        el.style.setProperty('--tpl-radius', RADIUS_MAP[style.cornerRadius] || style.cornerRadius);
      }
      if (style.mediaFit) el.style.setProperty('--tpl-media-fit', style.mediaFit);
      if (style.fontSizeScale) el.style.setProperty('--tpl-scale', style.fontSizeScale);
      if (style.tickerSpeed) {
        var SPEED_MAP = { slow: '20s', normal: '12s', fast: '6s' };
        el.style.setProperty('--tpl-ticker-speed', SPEED_MAP[style.tickerSpeed] || '12s');
      }
      if (style.gradientColor1 && style.gradientColor2) {
        var DIR_MAP = { to_bottom: 'to bottom', to_right: 'to right', to_bottom_right: 'to bottom right', to_left: 'to left', to_top: 'to top' };
        var dir = DIR_MAP[style.gradientDirection] || 'to bottom';
        el.style.background = 'linear-gradient(' + dir + ', ' + style.gradientColor1 + ', ' + style.gradientColor2 + ')';
      }
      if (style.transition) {
        var bodyClasses = document.body.className ? document.body.className.split(/\s+/) : [];
        var filtered = [];
        for (var i = 0; i < bodyClasses.length; i++) {
          if (bodyClasses[i] && bodyClasses[i].indexOf('transition-') !== 0) filtered.push(bodyClasses[i]);
        }
        if (style.transition !== 'none') filtered.push('transition-' + style.transition);
        document.body.className = filtered.join(' ');
      }
    })(div, currentTemplateStyle);
    var mediaEl = null;

    switch (item.content.type) {
      case 'webpage':
      case 'dashboard':
        var iframe = document.createElement('iframe');
        iframe.src = isSafeUrl(item.content.url) ? item.content.url : 'about:blank';
        iframe.allow = 'autoplay';
        mediaEl = iframe;
        break;
      case 'image':
        var img = document.createElement('img');
        img.src = item.content.url || item.content.filePath;
        img.alt = item.content.title;
        mediaEl = img;
        break;
      case 'video':
        var video = document.createElement('video');
        video.src = item.content.url || item.content.filePath;
        video.autoplay = true;
        video.muted = true;
        video.loop = false;
        video.playsInline = true;
        video.controls = false;
        videoElement = video;
        mediaEl = video;
        var stallCheckTimer = null;
        var lastTime = 0;
        var stallCount = 0;
        try { var p = video.play(); if (p && typeof p.catch === 'function') p.catch(function () {}); } catch (e) {}
        video.addEventListener('playing', function () {
          if (stallCheckTimer) clearInterval(stallCheckTimer);
          stallCount = 0;
          stallCheckTimer = setInterval(function () {
            if (video.paused || video.ended) return;
            if (video.currentTime === lastTime) {
              stallCount++;
              if (stallCount >= 3) {
                clearInterval(stallCheckTimer);
                videoElement = null;
                currentIndex = (currentIndex + 1) % items.length;
                renderCurrent();
              }
            } else {
              stallCount = 0;
            }
            lastTime = video.currentTime;
          }, 2000);
        });
        video.addEventListener('ended', function () {
          if (stallCheckTimer) clearInterval(stallCheckTimer);
          videoElement = null;
          currentIndex = (currentIndex + 1) % items.length;
          renderCurrent();
        });
        video.addEventListener('error', function () {
          if (stallCheckTimer) clearInterval(stallCheckTimer);
          setPlaybackState('error', item, 'Video no disponible');
          sendHeartbeat();
          container.innerHTML = '<div class="slide active" style="flex-direction:column;gap:8px;justify-content:center;align-items:center;">' +
            '<h2 style="font-size:1.5em;">' + escapeHtml(item.content.title) + '</h2>' +
            '<p style="opacity:0.5;">Video no disponible</p></div>';
          videoElement = null;
          setTimeout(function () {
            currentIndex = (currentIndex + 1) % items.length;
            renderCurrent();
          }, 5000);
        });
        break;
      case 'rss':
        div.className = 'slide active rss-content';
        div.innerHTML = '<h2 style="font-size:2em;margin-bottom:20px;">' + escapeHtml(item.content.title) + '</h2>' +
          (item.content.url ? '<p style="font-size:1.2em;opacity:0.7;">' + escapeHtml(item.content.url) + '</p>' : '');
        break;
      case 'html':
        div.className = 'slide active html-content';
        if (item.content.url) {
          var iframe2 = document.createElement('iframe');
          iframe2.src = item.content.url;
          iframe2.style.width = '100%';
          iframe2.style.height = '100%';
          iframe2.style.border = '0';
          div.appendChild(iframe2);
        } else {
          div.innerHTML = '<h2>' + escapeHtml(item.content.title) + '</h2>';
        }
        break;
      default:
        div.innerHTML = '<h2>' + escapeHtml(item.content.title) + '</h2>';
    }
    if (mediaEl) {
      if (currentTemplate === 'full_bleed') {
        div.appendChild(mediaEl);
        appendCustomCSS(div);
      } else {
        appendTemplateLayout(div, item, mediaEl);
      }
    }
    container.appendChild(div);
    if (item.content.type !== 'video') {
      scheduleNext();
    }
  }

  function startRotation() {
    if (rotationTimer) clearInterval(rotationTimer);
    if (items.length < 2) return;
    videoElement = null;
    scheduleNext();
  }

  function scheduleNext() {
    if (rotationTimer) clearTimeout(rotationTimer);
    var item = items[currentIndex];
    var dur = (item && item.duration) || 10;
    if (item && item.content && item.content.type === 'video') {
      return;
    }
    rotationTimer = setTimeout(function () {
      currentIndex = (currentIndex + 1) % items.length;
      renderCurrent();
    }, dur * 1000);
  }

  function showIdle() {
    document.body.classList.add('player-idle');
    document.body.classList.remove('player-playing');
    var purposeName = PURPOSE_LABELS[currentPurpose] || currentPurpose;
    container.innerHTML = '<div class="slide active" style="flex-direction:column;gap:16px;">' +
      '<div class="idle-card">' +
      '<span class="idle-purpose"><span class="idle-purpose-dot"></span>' + escapeHtml(purposeName) + '</span>' +
      '<h2>Signage Player</h2>' +
      '<p class="idle-muted">Esperando contenido...</p>' +
      (screenNameEl && screenNameEl.textContent ? '<p class="idle-muted">' + escapeHtml(screenNameEl.textContent) + '</p>' : '') +
      '</div></div>';
  }

  function logProofOfPlay(item) {
    if (!screenId || !item || !item.content || !item.content.id) return;
    var payload = {
      screenId: screenId,
      contentItemId: item.content.id,
      playlistId: item.playlistId,
      scheduleId: item.scheduleId,
      duration: item.duration || 10
    };
    sendProofOfPlay(payload).catch(function () {
      queueProofOfPlay(payload);
    });
  }

  function sendProofOfPlay(payload) {
    return fetch(API_BASE + '/proof-of-play/log', {
      method: 'POST',
      headers: screenHeaders(),
      body: JSON.stringify(payload)
    }).then(function (res) {
      if (!res.ok) throw new Error('proof failed');
      return res;
    });
  }

  function getProofQueue() {
    try {
      var raw = localStorage.getItem(PROOF_QUEUE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function saveProofQueue(queue) {
    localStorage.setItem(PROOF_QUEUE_KEY, JSON.stringify(queue.slice(-100)));
  }

  function queueProofOfPlay(payload) {
    var queue = getProofQueue();
    queue.push(payload);
    saveProofQueue(queue);
  }

  function flushProofQueue() {
    if (!screenId) return;
    var queue = getProofQueue();
    if (!queue.length) return;
    var remaining = queue.slice();
    var sendNext = function () {
      if (!remaining.length) {
        saveProofQueue([]);
        return;
      }
      var payload = remaining[0];
      if (payload.screenId !== screenId) {
        remaining.shift();
        saveProofQueue(remaining);
        sendNext();
        return;
      }
      sendProofOfPlay(payload).then(function () {
        remaining.shift();
        saveProofQueue(remaining);
        sendNext();
      }).catch(function () {
        saveProofQueue(remaining);
      });
    };
    sendNext();
  }

  function isSafeUrl(url) {
    if (!url) return false;
    try {
      var u = new URL(url);
      return u.protocol === 'http:' || u.protocol === 'https:';
    } catch (e) { return false; }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function tplVars() {
    var purposeName = PURPOSE_LABELS[currentPurpose] || currentPurpose;
    var item = items[currentIndex];
    return {
      badge: currentTemplateText.badge || purposeName,
      headline: currentTemplateText.headline || (item && item.content ? item.content.title : screenNameEl.textContent) || 'Content',
      subtitle: currentTemplateText.subtitle || screenNameEl.textContent || '',
      qrText: currentTemplateText.qrText || 'QR',
      weatherLocation: currentTemplateText.weatherLocation || 'United Kingdom',
      temperature: currentTemplateText.temperature || '16°C',
      ticker: currentTemplateText.ticker || 'News ticker message goes here and can be edited for this screen',
      logoText: currentTemplateText.logoText || '▲',
    };
  }

  function appendTemplateLayout(div, item, mediaEl) {
    if (!item || !item.content) return;
    var v = tplVars();
    var showWeather = currentTemplateStyle.showWeather !== 'no';
    var showTicker = currentTemplateStyle.showTicker !== 'no';
    var qrSrc = currentTemplateStyle.qrUrl;
    var logoSrc = currentTemplateStyle.logoUrl;

    var qrHtml = qrSrc ? '<img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=' + encodeURIComponent(qrSrc) + '" alt="QR" style="display:block;max-width:100%;max-height:100%;">' : escapeHtml(v.qrText);
    var logoHtml = logoSrc ? '<img src="' + escapeHtml(logoSrc) + '" alt="Logo">' : escapeHtml(v.logoText);
    var tickerEsc = escapeHtml(v.ticker);

    if (currentTemplate === 'media_left' || currentTemplate === 'media_right') {
      var grid = document.createElement('div');
      grid.className = 'tpl-grid';
      var m = document.createElement('div');

      m.appendChild(mediaEl);

      s.className = 'tpl-sidebar';
      s.innerHTML = '<div class="tpl-badge">' + escapeHtml(v.badge) + '</div><div class="tpl-headline">' + escapeHtml(v.headline) + '</div><div class="tpl-subrow"><div class="tpl-qr">' + qrHtml + '</div><div class="tpl-subtitle">' + escapeHtml(v.subtitle) + '</div></div>';
      if (currentTemplate === 'media_right') { grid.appendChild(s); grid.appendChild(m); } else { grid.appendChild(m); grid.appendChild(s); }
      if (showWeather) {
        var w = document.createElement('div');
        w.className = 'tpl-weather-right';
        w.innerHTML = '<div><div class="tpl-wloc">' + escapeHtml(v.weatherLocation) + '</div><div class="tpl-wpill">Today</div></div><div><div class="tpl-wicon">☁</div><div class="tpl-wtemp">' + escapeHtml(v.temperature) + '</div><div class="tpl-wfeel">Feels like 16°</div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:0.45vw;"><span style="background:rgba(255,255,255,0.15);border-radius:var(--tpl-radius);padding:0.55em;font-size:0.62em;font-weight:850;">Tue · 17°</span><span style="background:rgba(255,255,255,0.15);border-radius:var(--tpl-radius);padding:0.55em;font-size:0.62em;font-weight:850;">Wed · 18°</span><span style="background:rgba(255,255,255,0.15);border-radius:var(--tpl-radius);padding:0.55em;font-size:0.62em;font-weight:850;">Thu · 16°</span><span style="background:rgba(255,255,255,0.15);border-radius:var(--tpl-radius);padding:0.55em;font-size:0.62em;font-weight:850;">Fri · 19°</span></div>';
        grid.appendChild(w);
      }
      div.appendChild(grid);
    } else if (currentTemplate === 'center_stage') {
      var c = document.createElement('div');
      c.className = 'tpl-center';
      var cm = document.createElement('div');
      cm.className = 'tpl-center-media';
      cm.appendChild(mediaEl);
      var cb = document.createElement('div');
      cb.className = 'tpl-center-bar';
      cb.innerHTML = '<span class="tpl-center-badge">' + escapeHtml(v.badge) + '</span><span class="tpl-center-headline">' + escapeHtml(v.headline) + '</span><span class="tpl-center-sub">' + escapeHtml(v.subtitle) + '</span><span class="tpl-center-qr">' + qrHtml + '</span>' + (showWeather ? '<span class="tpl-center-widget">☁ ' + escapeHtml(v.temperature) + ' ' + escapeHtml(v.weatherLocation) + '</span>' : '');
      c.appendChild(cm);
      c.appendChild(cb);
      div.appendChild(c);
    } else if (currentTemplate === 'hero_overlay') {
      var h = document.createElement('div');
      h.className = 'tpl-hero';
      var hb = document.createElement('div');
      hb.className = 'tpl-hero-bg';
      hb.appendChild(mediaEl);
      var ho = document.createElement('div');
      ho.className = 'tpl-hero-overlay';
      ho.innerHTML = '<div class="tpl-hero-badge">' + escapeHtml(v.badge) + '</div><div class="tpl-hero-headline">' + escapeHtml(v.headline) + '</div><div class="tpl-hero-subrow"><div class="tpl-hero-qr">' + qrHtml + '</div><div class="tpl-hero-sub">' + escapeHtml(v.subtitle) + '</div></div>';
      h.appendChild(hb);
      h.appendChild(ho);
      if (showWeather) {
        var hw = document.createElement('div');
        hw.className = 'tpl-hero-widget';
        hw.innerHTML = '<div class="tpl-hero-wloc">' + escapeHtml(v.weatherLocation) + '</div><div class="tpl-hero-wicon">☁</div><div class="tpl-hero-wtemp">' + escapeHtml(v.temperature) + '</div>';
        h.appendChild(hw);
      }
      div.appendChild(h);
    }

    if (showTicker) {
      var tk = document.createElement('div');
      tk.className = 'tpl-ticker';
      tk.innerHTML = '<div class="tpl-ticker-logo">' + logoHtml + '</div><div class="tpl-ticker-track"><div class="tpl-ticker-text marquee">' + tickerEsc + '</div><div class="tpl-ticker-text tpl-ticker-text-clone marquee">' + tickerEsc + '</div></div>';
      div.appendChild(tk);
    }

    appendCustomCSS(div);
  }

  function appendCustomCSS(div) {
    var customCSS = currentTemplateStyle.customCSS;
    if (!customCSS) return;
    var st = document.createElement('style');
    st.textContent = customCSS;
    div.appendChild(st);
  }

  // --- WebSocket ---
  function connectWebSocket() {
    if (ws) { ws.close(); }
    var wsUrl = WS_BASE + '/ws/screen/' + screenId;
    if (screenToken) {
      wsUrl += '?token=' + encodeURIComponent(screenToken);
    }
    ws = new WebSocket(wsUrl);
    ws.onopen = function () {
      setStatus('online', 'Conectado');
      wsReconnectDelay = 5000;
    };
    ws.onmessage = function (event) {
      try {
        var msg = JSON.parse(event.data);
        if (msg.type === 'playlist_update' || msg.type === 'content_update' || msg.type === 'purpose_update') {
          if (msg.type === 'purpose_update' && msg.screenId && msg.screenId !== screenId) return;
          if (msg.purpose) applyPurpose(msg.purpose);
          if (msg.template) applyTemplate(msg.template);
          if (msg.templateText) applyTemplateText(msg.templateText);
          if (msg.templateStyle) applyTemplateStyle(msg.templateStyle);
          fetchPlaylist();
        }
        if (msg.type === 'screen_deleted') {
          showPairingScreen('Esta pantalla fue eliminada. Genera un nuevo código para vincularla otra vez.');
        }
        if (msg.type === 'hard_reset') {
          var reloadAfterCleanup = function () { location.reload(); };
          if ('serviceWorker' in navigator) {
            var cleanupTasks = [
              navigator.serviceWorker.getRegistrations().then(function (regs) {
                for (var i = 0; i < regs.length; i++) { regs[i].unregister(); }
              })
            ];
            if ('caches' in window) {
              cleanupTasks.push(caches.keys().then(function (names) {
                for (var i = 0; i < names.length; i++) { caches.delete(names[i]); }
              }));
            }
            Promise.all(cleanupTasks).then(reloadAfterCleanup).catch(reloadAfterCleanup);
          } else {
            reloadAfterCleanup();
          }
        }
      } catch (e) {}
    };
    ws.onclose = function () {
      setStatus('offline', 'Desconectado');
      if (reconnectAllowed && screenId) {
        setTimeout(connectWebSocket, wsReconnectDelay);
        wsReconnectDelay = Math.min(wsReconnectDelay * 2, WS_RECONNECT_MAX);
      }
    };
    ws.onerror = function () {
      ws.close();
    };
  }

  // --- Heartbeat ---
  function startHeartbeat() {
    if (heartbeatTimer) clearInterval(heartbeatTimer);
    sendHeartbeat();
    heartbeatTimer = setInterval(sendHeartbeat, HEARTBEAT_INTERVAL);
  }

  // --- Auto-update ---
  var playerVersion = localStorage.getItem('signage_player_version') || '';
  var UPDATE_CHECK_INTERVAL = 60000;

  function checkPlayerUpdate() {
    fetch(API_BASE + '/player/version')
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data.version && data.version !== playerVersion) {
          localStorage.setItem('signage_player_version', data.version);
          location.reload();
        }
      })
      .catch(function () {});
  }
  setInterval(checkPlayerUpdate, UPDATE_CHECK_INTERVAL);
  checkPlayerUpdate();

  // --- Fullscreen ---
  var fsBtn = document.getElementById('fs-btn');
  function syncFullscreenState(force) {
    var isFullscreen = typeof force === 'boolean' ? force : !!document.fullscreenElement;
    fsBtn.textContent = isFullscreen ? '⛶ Salir' : '⛶ Pantalla completa';
    document.body.classList.toggle('is-fullscreen', isFullscreen);
  }
  fsBtn.addEventListener('click', function () {
    if (document.fullscreenElement) {
      document.exitFullscreen().catch(function () {});
      syncFullscreenState(false);
    } else {
      document.documentElement.requestFullscreen().catch(function () {});
      syncFullscreenState(true);
    }
  });
  document.addEventListener('fullscreenchange', function () {
    syncFullscreenState();
  });
  syncFullscreenState();

  // --- Init ---
  applyPurpose('other');
  var pairFromUrl = '';
  try {
    pairFromUrl = new URLSearchParams(window.location.search).get('pair') || '';
  } catch (e) {}
  if (pairFromUrl) {
    localStorage.removeItem('signage_screen_id');
    pairInput.value = pairFromUrl.toUpperCase().substring(0, 6);
    if (pairInput.value.length === 6) doPair();
  } else {
    var storedId = localStorage.getItem('signage_screen_id');
    if (storedId) {
    screenId = storedId;
    screenToken = localStorage.getItem(SCREEN_TOKEN_KEY);
    reconnectAllowed = true;
    pairScreen.classList.add('hidden');
    document.body.classList.remove('player-pairing');
    screenNameEl.textContent = 'Pantalla';
    startPlayer();
    }
  }
})();
</script>
</body>
</html>

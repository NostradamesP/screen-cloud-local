services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: signage
      POSTGRES_PASSWORD: signage
      POSTGRES_DB: signage
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signage"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://signage:signage@postgres:5432/signage
      REDIS_URL: redis://redis:6379
      UPLOAD_DIR: /data/uploads
      JWT_SECRET: local-dev-secret-for-docker-only
      JWT_EXPIRES_IN: 7d
      DEFAULT_ORG_NAME: Mi Empresa
    volumes:
      - uploads:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
